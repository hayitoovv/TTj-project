services:
  postgres:
    image: postgres:16-alpine
    container_name: ttj_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No host port exposure — only internal docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ttj_net

  redis:
    image: redis:7-alpine
    container_name: ttj_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ttj_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ttj_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers --forwarded-allow-ips="*"
    networks:
      - ttj_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://ttj.ultrasoft.uz/api/v1
    container_name: ttj_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://ttj.ultrasoft.uz/api/v1
    depends_on:
      - backend
    networks:
      - ttj_net

  nginx:
    image: nginx:1.27-alpine
    container_name: ttj_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot-www:/var/www/certbot:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - backend_uploads:/var/www/uploads:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ttj_net

  certbot:
    image: certbot/certbot:latest
    container_name: ttj_certbot
    restart: "no"
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/certbot-www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  ttj_net:
    driver: bridge
