services:
  postgres:
    image: postgres:16-alpine
    container_name: ttj_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ttj_net

  redis:
    image: redis:7-alpine
    container_name: ttj_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ttj_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ttj_backend
    restart: unless-stopped
    env_file:
      - .env
    # Expose ONLY to localhost — host nginx will proxy
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers --forwarded-allow-ips="*"
    networks:
      - ttj_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://ttj.zarmeduniver.com/api/v1
    container_name: ttj_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://ttj.zarmeduniver.com/api/v1
    # Expose ONLY to localhost — host nginx will proxy
    ports:
      - "127.0.0.1:13000:3000"
    depends_on:
      - backend
    networks:
      - ttj_net

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  ttj_net:
    driver: bridge
