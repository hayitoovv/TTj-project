# ============================================================
# TTJ Platforma — Nginx production config
# Domain: ttj.ultrasoft.uz
# ============================================================
# IMPORTANT:
# - First boot: only the HTTP server block runs (Certbot needs it for HTTP-01 challenge).
# - After running scripts/init-ssl.sh, uncomment the HTTPS block AND the redirect line.
# ============================================================

upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8000;
}

# ---------- HTTP (port 80) ----------
server {
    listen 80;
    listen [::]:80;
    server_name ttj.ultrasoft.uz;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ---- After SSL is set up, uncomment this redirect ----
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # ---- Before SSL: serve directly via HTTP ----
    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

