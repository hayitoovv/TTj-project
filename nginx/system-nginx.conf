# ============================================================
# TTJ Platforma — host system nginx config
# Place this at /etc/nginx/sites-available/ttj.ultrasoft.uz
# Symlink: /etc/nginx/sites-enabled/ttj.ultrasoft.uz
# ============================================================

# HTTP — Certbot ACME challenge + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ttj.ultrasoft.uz;

    # Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Before SSL: serve via HTTP (uncomment redirect after SSL is set up)
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTPS — activated by `sudo certbot --nginx -d ttj.ultrasoft.uz`
# certbot will append the SSL server block here automatically.
